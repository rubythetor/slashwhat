          <h2>slashwhat — Visual Subnet Calculator & CIDR Planner</h2>
          <p>slashwhat is a free, browser-based visual subnet calculator for network engineers. Enter any CIDR block (like 10.0.0.0/8 or 192.168.0.0/16) and interactively split and join subnets in a color-coded table.</p>
          <p>Features include: IPv4 and IPv6 support, VLAN macro language, multiple color themes, undo/redo, save/load configurations, CSV export, binary visualization, and RFC classification.</p>
